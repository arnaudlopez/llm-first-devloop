name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Node test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Smoke test packaged binaries
        run: |
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/pack" "$tmpdir/consumer"
          packfile="$(npm pack --pack-destination "$tmpdir/pack" | tail -n 1)"
          cd "$tmpdir/consumer"
          npm init -y
          npm install "$tmpdir/pack/$packfile"
          cp -R "$GITHUB_WORKSPACE/examples" .
          npx --no-install llm-first-devloop --help
          npx --no-install goalbuddy-ready --help
          npx --no-install goalbuddy-check --help
          npx --no-install goalbuddy-run --help
          npx --no-install goalbuddy-advance --help
          npx --no-install llm-first-devloop run \
            --from examples/conversation-notes.md \
            --out goals/pkg-saved-search \
            --oracle "Acceptance tests prove package-installed run works." \
            --force

      - name: Smoke test CLIs
        run: |
          node scripts/llm-first-devloop.mjs --help
          node scripts/goalbuddy-brief.mjs --help
          node scripts/goalbuddy-interview.mjs --help
          node scripts/goalbuddy-ready-mode.mjs --help
          node scripts/goalbuddy-next.mjs --help
          node scripts/goalbuddy-run.mjs --help
          node scripts/goalbuddy-advance.mjs --help
          node scripts/goalbuddy-quality-check.mjs --help
          node scripts/goalbuddy-board-repair.mjs --help
          node scripts/llm-first-devloop.mjs --help
          rm -rf /tmp/llm-first-devloop-ci
          mkdir -p /tmp/llm-first-devloop-ci
          node scripts/llm-first-devloop.mjs interview --from examples/brief-feature.md --out /tmp/llm-first-devloop-ci/brief.md
          node scripts/llm-first-devloop.mjs ready --from /tmp/llm-first-devloop-ci/brief.md --out /tmp/llm-first-devloop-ci/goal --oracle "Acceptance tests prove saved searches can be created, listed, reopened, renamed, and deleted."
          node scripts/llm-first-devloop.mjs check /tmp/llm-first-devloop-ci/goal/state.yaml
          node scripts/llm-first-devloop.mjs next /tmp/llm-first-devloop-ci/goal/state.yaml
          node scripts/llm-first-devloop.mjs run --from examples/supermemory-t4-notes.md --out /tmp/llm-first-devloop-ci/t4 --oracle "A checker-clean SuperMemory T4 board reaches an active-task handoff." --force
