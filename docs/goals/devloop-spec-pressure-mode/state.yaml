      - "feedback_policy: targeted test cadence, typecheck, browser checks, and full-suite timing"
      - "acceptance_contract_updates: exact end-state evidence and failure modes"
      - "dirty_worktree_risk_map: unrelated files that must stay untouched"
      - "impact_assessment covering db_schema_migrations, data_backfill, env_secrets, auth_permissions, api_contract, ui_routes, background_jobs, external_services, deploy_rollback, observability, and docs"
    receipt:
      result: done
      summary: "Mapped current intake. analyzeInterview already blocks missing non_goals/oracle/acceptance_evidence and writes needs-clarification.md, but the content is basic: missing inputs, questions, mode/oracle hints, next step, source notes. It does not explain misfire risk, propose an amended spec skeleton, or pressure the owner toward TDD-ready evidence."
      design_concept: "Spec Pressure Mode remains local and deterministic. Immature input should generate a concise coaching artifact that names why it is unsafe to proceed, asks priority questions, drafts an amended spec skeleton, and defines the minimal oracle/evidence needed before Ready Mode."
      ubiquitous_language:
        spec_pressure: "Deterministic intake friction applied before board creation."
        light_spec: "Input missing enough intent, non-goals, oracle, or acceptance evidence to safely enter Ready Mode."
        misfire_risk: "What bad implementation or audit outcome is likely if DevLoop proceeds now."
        amended_spec_draft: "A scaffold the owner can fill or validate in the LLM-first conversation."
        minimal_oracle: "The weakest acceptable observable proof before Ready Mode."
      module_map:
        target_files:
          - scripts/goalbuddy-interview.mjs
          - scripts/goalbuddy-interview.test.mjs
          - "docs/goals/devloop-spec-pressure-mode/**"
          - docs/devloop-spec-pressure-mode-notes.md
        related_files:
          - scripts/goalbuddy-run.mjs
          - scripts/goalbuddy-run.test.mjs
      interface_contract:
        analyzeInterview: "Immature input returns needs_clarification with enriched content; mature input still returns ready."
        writeInterview: "Still writes needs-clarification.md instead of brief when not ready."
        loop --from: "Still stops before Ready Mode board generation when interview needs clarification."
      test_strategy:
        red: "Add tests asserting enriched clarification sections and loop-from behavior for immature notes."
        green: "Enhance renderClarification without weakening mature-ready detection."
      feedback_policy: "Run node --test scripts/goalbuddy-interview.test.mjs scripts/goalbuddy-run.test.mjs for red/green, then npm test and git diff --check."
      dirty_worktree_risk_map: "Only current notes/board are dirty before implementation."
      impact_assessment:
        db_schema_migrations: none
        data_backfill: none
        env_secrets: none
        auth_permissions: none
        api_contract: "additive clarification content shape"
        ui_routes: none
        background_jobs: none
        external_services: none
        deploy_rollback: "git revert"
        observability: "unit tests and clarification artifact text"
        docs: "goal notes/board only"
