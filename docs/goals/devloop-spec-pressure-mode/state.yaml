version: 2
goal:
  slug: "devloop-spec-pressure-mode"
  title: "DevLoop Spec Pressure Mode"
  status: complete
  created_at: "2026-05-24"
  updated_at: "2026-05-24"
  kind: specific
  original_request: "# DevLoop Spec Pressure Mode\n\n## Intent\n\nStrengthen the LLM-first intake so a light spec is challenged before Ready Mode. If the input is too vague, DevLoop should not create a weak board; it should produce a useful `needs-clarification.md` that helps the owner improve the spec.\n\nThe clarification should feel like a product/engineering coach: concise, direct, and oriented toward TDD-ready evidence.\n\n- Do not use an LLM API.\n- Do not block mature specs.\n- Do not invent precise repo facts before Scout reads the repo.\n- Do not create `state.yaml` for immature inputs.\n- Do not ask dozens of questions.\n\n## Non-Goals\n\n- TODO: Name what this goal must not change.\n\n## Proposed Oracle\n\nTests prove that immature notes produce a pressure-oriented needs-clarification.md with missing inputs, risk of misfire, priority questions, an amended spec draft, and minimal oracle guidance, while mature notes still produce a brief.\n\n## Suggested Mode\n\nimplementation\n\n## Acceptance Hints\n\n- Immature notes return `needs_clarification`.\n- The clarification includes why the spec is too light.\n- The clarification includes risk/misfire warnings.\n- The clarification includes a small number of priority questions.\n- The clarification includes a proposed amended spec skeleton.\n- The clarification includes a minimal oracle/evidence section.\n- Mature notes still return `ready`.\n- `loop --from` still stops before board generation when clarification is needed.\n- `npm test` passes.\n\n## Risks And Open Questions\n\n- TODO: List ambiguity, missing credentials, operational risks, or decisions needed before implementation.\n\n## Constraints\n\n- TODO: Capture constraints, must-preserve behavior, boundaries, or forbidden changes.\n\n## Ready Mode Command\n\n```bash\nnpm run ready -- --from ./docs/goals/devloop-spec-pressure-mode/brief.md --mode implementation --oracle \"Tests prove that immature notes produce a pressure-oriented needs-clarification.md with missing inputs, risk of misfire, priority questions, an amended spec draft, and minimal oracle guidance, while mature notes still produce a brief.\" --out docs/goals/devloop-spec-pressure-mode\n```\n\n## Source Notes\n\nCompiled from: /Users/arnaud/Documents/llm-first-devloop/docs/devloop-spec-pressure-mode-notes.md\n\n> # DevLoop Spec Pressure Mode\n> \n> ## Intent\n> \n> Strengthen the LLM-first intake so a light spec is challenged before Ready Mode. If the input is too vague, DevLoop should not create a weak board; it should produce a useful `needs-clarification.md` that helps the owner improve the spec.\n> \n> The clarification should feel like a product/engineering coach: concise, direct, and oriented toward TDD-ready evidence.\n> \n> ## Non-Goals\n> \n> - Do not use an LLM API.\n> - Do not block mature specs.\n> - Do not invent precise repo facts before Scout reads the repo.\n> - Do not create `state.yaml` for immature inputs.\n> - Do not ask dozens of questions.\n> \n> ## Proposed Oracle\n> \n> Tests prove that immature notes produce a pressure-oriented `needs-clarification.md` with missing inputs, risk of misfire, priority questions, an amended spec draft, and minimal oracle guidance, while mature notes still produce a brief.\n> \n> ## Acceptance\n> \n> - Immature notes return `needs_clarification`.\n> - The clarification includes why the spec is too light.\n> - The clarification includes risk/misfire warnings.\n> - The clarification includes a small number of priority questions.\n> - The clarification includes a proposed amended spec skeleton.\n> - The clarification includes a minimal oracle/evidence section.\n> - Mature notes still return `ready`.\n> - `loop --from` still stops before board generation when clarification is needed.\n> - `npm test` passes.\n> \n> ## Suggested Mode\n> \n> implementation"
  interpreted_outcome: "Run the prepared LLM-first workflow for DevLoop Spec Pressure Mode."
  input_shape: specific
  audience: "Product owner and target users"
  authority: requested
  proof_type:
    - test
    - artifact
    - review
  completion_proof: "Final audit maps red tests, green verification, implementation receipts, and shipping proof back to the oracle."
  goal_oracle: "Tests prove that immature notes produce a pressure-oriented needs-clarification.md with missing inputs, risk of misfire, priority questions, an amended spec draft, and minimal oracle guidance, while mature notes still produce a brief."
  oracle:
    signal: "Tests prove that immature notes produce a pressure-oriented needs-clarification.md with missing inputs, risk of misfire, priority questions, an amended spec draft, and minimal oracle guidance, while mature notes still produce a brief."
    final_proof: "T999 states full_outcome_complete: true and cites passing acceptance evidence, verification commands, design review, and T998 shipping evidence."
  likely_misfire: "Starting implementation from a plausible plan before converting the owner outcome into acceptance tests and observable proof."
  constraints:
    - "Acceptance tests or equivalent observable proof must be written before production implementation."
    - "Implementation must stay inside Judge-approved allowed_files."
    - "Unrelated dirty worktree changes must remain untouched."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  allow_read_only_goal_without_shipping: true
  require_quality_checker: true
  require_tdd_worker_flow: true
  require_github_ship_task: true
  require_impact_assessment: true
  goal_pressure_requires_oracle: true

goal_policy:
  mode: implementation
  requires_tdd: true
  requires_impact_assessment: true
  requires_shipping: true
  requires_visual_verification: false
  requires_migration_proof: false
  requires_infra_proof: false
  requires_dependency_review: false
  requires_dirty_worktree_guard: true
  requires_refactor_proof: false
  rationale: "Ready Mode is for app-code or product-behavior work after an LLM-first spec conversation has converged."

workflow_safeguards:
  requires_design_concept: true
  requires_ubiquitous_language: true
  requires_feedback_policy: true
  requires_test_strategy: true
  requires_module_map: true
  requires_interface_contract: true
  requires_architecture_review: true
  requires_design_delta: true
  require_t998_shipping: true
  require_t999_final_audit: true
  protect_unrelated_dirty_worktree: true

agents:
  scout: installed
  worker: installed
  judge: installed

