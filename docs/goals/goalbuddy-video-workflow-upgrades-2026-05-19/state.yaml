version: 2

goal:
  title: "GoalBuddy Video Workflow Upgrades"
  slug: "goalbuddy-video-workflow-upgrades-2026-05-19"
  kind: specific
  tranche: "Design and implement tested local GoalBuddy workflow upgrades inspired by the AI coding fundamentals video."
  status: done
  intake:
    original_request: "Préparer le travail pour améliorer notre modèle GoalBuddy avec toutes les propositions de la vidéo."
    interpreted_outcome: "GoalBuddy local customization produces boards that improve intake clarity, architecture discipline, feedback cadence, TDD reliability, and final proof without becoming bureaucratic."
    input_shape: specific
    audience: "Arnaud using GoalBuddy/Codex for reliable AI-assisted development workflows"
    authority: requested
    proof_type:
      - test
      - artifact
      - review
    completion_proof: "A tested local customization update with example boards/checker coverage and a final audit proving the video-derived workflow safeguards are active and proportionate."
    likely_misfire: "Adding lots of process fields that look rigorous but slow GoalBuddy down, or forcing implementation-only gates onto audit and verification goals."
    blind_spots_considered:
      - "Shared design concept may require intake questions, but the board must not stall when defaults are safe."
      - "Ubiquitous language should reduce ambiguity, not create a mandatory glossary for trivial work."
      - "TDD and feedback cadence should apply strongly to code-changing goals, while audit, verification, research, and docs stay proportionate."
      - "Architecture/deep-module review should protect maintainability without blocking small local fixes."
      - "Interface-first planning can improve Worker handoffs, but Judge must avoid inventing abstractions before Scout sees the code."
      - "The existing customization must remain update-friendly and idempotent."
      - "No active git repository may exist; shipping must be explicit, safe, and honestly blocked if unavailable."
    existing_plan_facts:
      - "User chose no visual board."
      - "User wants all three improvement families: intake clarity, architecture quality, and execution robustness."
      - "Success proof should be tests plus representative generated/repaired board examples."
      - "Scope excludes upstream GoalBuddy refactor; keep the local patch/adaptation model."
      - "Video proposals include shared design concept, grill-me intake, design tree, ubiquitous language, feedback loops, TDD, small steps, deep modules, interface-first delegation, module maps, and daily design investment."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  allow_read_only_goal_without_shipping: true
  require_impact_assessment: true
  require_quality_checker: true
  require_github_ship_task: true
  require_tdd_worker_flow: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

goal_policy:
  mode: implementation
  requires_tdd: true
  requires_impact_assessment: true
  requires_shipping: true
  requires_visual_verification: false
  requires_migration_proof: false
  requires_infra_proof: false
  requires_dependency_review: false
  requires_dirty_worktree_guard: true
  requires_refactor_proof: false

workflow_safeguards:
  requires_design_concept: true
  requires_ubiquitous_language: true
  requires_feedback_policy: true
  requires_test_strategy: true
  requires_module_map: true
  requires_interface_contract: true
  requires_architecture_review: true
  requires_design_delta: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/goalbuddy-video-workflow-upgrades-2026-05-19"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Map the current local GoalBuddy customization scripts, installed patches, templates, tests, and generated-board failure modes relevant to the video-derived workflow upgrades."
    inputs:
      - "Current local customization scripts under scripts/"
      - "Current GoalBuddy skill and installed patched templates/instructions"
      - "Existing quality-check, board-repair, and personalization tests"
      - "Video-derived proposal list from the user conversation"
    constraints:
      - "Read-only."
      - "Do not edit scripts, templates, installed GoalBuddy files, or product files."
      - "Use concrete file-path evidence."
      - "Separate implementation-goal needs from audit, verification, research, docs, infra, data migration, frontend, and release needs."
    expected_output:
      - "module_map: relevant deep modules, boundaries, and shallow-module risks"
      - "ubiquitous_language: domain terms, overloaded words, and forbidden synonyms"
      - "design_concept: shared understanding, non-goals, and decision dependencies"
      - "Current customization surface map."
      - "Existing test coverage and gaps."
      - "Video proposal -> current support matrix."
      - "Lightweight versus heavyweight gate recommendations by goal_policy.mode."
      - "Candidate verification commands."
      - "impact_assessment covering db_schema_migrations, data_backfill, env_secrets, auth_permissions, api_contract, ui_routes, background_jobs, external_services, deploy_rollback, observability, and docs"
    receipt:
      result: done
      summary: "Current customization already gates TDD, impact assessment, policy modes, shipping, board repair, and final audit; video-derived design safeguards are not yet first-class or test-enforced."
      evidence:
        - "scripts/goalbuddy-quality-check.mjs"
        - "scripts/goalbuddy-board-repair.mjs"
        - "scripts/personalize-goalbuddy.mjs"
        - "scripts/goalbuddy-quality-check.test.mjs"
        - "scripts/goalbuddy-board-repair.test.mjs"
        - "README.md"
      surface_map:
        quality_checker:
          - "Validates version, require_quality_checker, goal_policy modes, implementation TDD evidence, impact_assessment, T998 shipping, T999 final audit, mode-specific proof, and final state."
          - "Already supports implementation, bugfix, refactor, audit_read_only, verification, research, docs, infra, data_migration, frontend, and release modes."
        board_repair:
          - "Adds rules, goal_policy, Scout impact assessment, Worker impact refs/stop conditions, shipping task when required, and final audit."
          - "Does not yet add video-derived planning sections or final evidence expectations."
        personalization:
          - "Copies checker and repair scripts into Claude/Codex GoalBuddy installs and patches Worker/Judge/templates/SKILL.md through managed blocks."
          - "Current managed blocks are focused on TDD, impact, mode selection, verification/audit proportionality, and GitHub delivery."
        tests:
          - "Existing tests cover implementation TDD/shipping, active Worker shape, impact assessment, audit exemption, verification mode, docs mode, data_migration, frontend, disk reads, and repair of implementation/verification boards."
      video_support_matrix:
        shared_design_concept: "partial via intake fields and likely_misfire; not a named required contract."
        grill_me_intake: "partial in GoalBuddy diagnostic ladder; not represented in generated state evidence."
        design_tree_dependencies: "missing as explicit decision/dependency map."
        ubiquitous_language: "missing as a board field or Scout/Judge output."
        feedback_loops: "partial through verify commands and TDD; no explicit feedback cadence/speed limit."
        tdd_small_steps: "strong for implementation Workers."
        test_strategy_decisions: "partial; tests required but strategy choices are not explicit."
        deep_modules: "missing as architecture/deep-module review evidence."
        interface_first_delegation: "missing as Judge/Worker interface contract."
        module_map: "missing as Scout/Judge output."
        design_delta_daily_investment: "missing from final audit."
      mode_recommendations:
        implementation_bugfix_frontend_data_migration: "Require design_concept, feedback_policy, test_strategy, and module/interface/architecture notes when code changes are non-trivial."
        refactor: "Require module_map, interface_contract or public boundary statement, characterization/behavior_unchanged evidence, and design_delta."
        verification: "Keep lightweight: require safe verification plan/evidence only; allow optional module_map when tests target multiple surfaces."
        audit_read_only: "Keep lightweight: require audit_scope/findings/decision only; do not require TDD/shipping/design ceremony."
        research_docs: "Require source/decision or docs proof; optional ubiquitous language if terminology is central."
        infra_release: "Keep infra proof/rollback primary; optional interface/module notes only if app architecture changes."
      impact_assessment:
        db_schema_migrations: not_required
        data_backfill: not_required
        env_secrets: not_required
        auth_permissions: not_required
        api_contract: not_required
        ui_routes: not_required
        background_jobs: not_required
        external_services: not_required
        deploy_rollback: not_required
        observability: not_required
        docs: required
      coverage_gaps:
        - "Checker has no concepts for design_concept, ubiquitous_language, module_map, interface_contract, test_strategy, feedback_policy, architecture_review, or design_delta."
        - "Repair script cannot add those contracts to generated boards."
        - "Personalization script does not patch Worker/Judge/SKILL/template instructions with these video-derived safeguards."
        - "README does not document the new workflow model."
        - "No regression tests prove mode proportionality for these new safeguards."
      candidate_verification_commands:
        - "node --test scripts/goalbuddy-quality-check.test.mjs scripts/goalbuddy-board-repair.test.mjs"
        - "node scripts/personalize-goalbuddy.mjs --dry-run"
        - "node scripts/goalbuddy-board-repair.mjs --dry-run --json docs/goals/goalbuddy-video-workflow-upgrades-2026-05-19/state.yaml"
        - "node scripts/goalbuddy-quality-check.mjs docs/goals/goalbuddy-video-workflow-upgrades-2026-05-19/state.yaml"

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the safest architecture and first implementation package for adding design-concept, ubiquitous-language, feedback-cadence, test-strategy, and architecture-review safeguards."
    inputs:
      - "T001 receipt"
      - "Current goal.md and state.yaml"
    constraints:
      - "Do not implement."
      - "Reject changes that make audit_read_only or verification modes behave like implementation goals."
      - "Reject broad rewrites of GoalBuddy upstream or installed vendor files outside the personalization script."
      - "Prefer rules that can be checked deterministically from state.yaml or example boards."
      - "Pick the largest safe useful Worker slice with explicit allowed_files, verify commands, and stop conditions."
    expected_output:
      - "architecture_review"
      - "interface_contract"
      - "module_map"
      - "test_strategy"
      - "feedback_policy"
      - "Architecture decision."
      - "Exact Worker objective."
      - "allowed_files."
      - "verify."
      - "stop_if."
      - "impact_assessment_ref."
      - "Deferred or blocked tasks."
    receipt:
      result: done
      decision: "approved"
      architecture_decision: "Add a workflow-safeguards layer to the existing local customization, not a new subsystem: checker validates evidence, repair inserts missing contract fields, personalization patches installed GoalBuddy prompts/templates, README documents the model."
      rationale:
        - "The existing scripts already form the right deep boundary: generated state goes through repair, checker, and installer-managed prompt/template patches."
        - "New video-derived requirements should be state.yaml evidence, not hidden chat expectations."
        - "Audit_read_only and verification must stay proportionate; only implementation-like modes should require the heavier design/test/architecture evidence."
      exact_worker_objective: "Implement deterministic workflow safeguard fields and checks for design_concept, ubiquitous_language, feedback_policy, test_strategy, module_map, interface_contract, architecture_review, and design_delta; update repair/personalization/README/tests."
      allowed_files:
        - "scripts/goalbuddy-quality-check.mjs"
        - "scripts/goalbuddy-board-repair.mjs"
        - "scripts/personalize-goalbuddy.mjs"
        - "scripts/goalbuddy-quality-check.test.mjs"
        - "scripts/goalbuddy-board-repair.test.mjs"
        - "README.md"
        - "docs/goals/goalbuddy-video-workflow-upgrades-2026-05-19/state.yaml"
      verify:
        - "node --check scripts/goalbuddy-quality-check.mjs"
        - "node --check scripts/goalbuddy-board-repair.mjs"
        - "node --check scripts/personalize-goalbuddy.mjs"
        - "node --test scripts/goalbuddy-quality-check.test.mjs scripts/goalbuddy-board-repair.test.mjs"
        - "node scripts/personalize-goalbuddy.mjs --dry-run"
        - "node scripts/goalbuddy-quality-check.mjs docs/goals/goalbuddy-video-workflow-upgrades-2026-05-19/state.yaml"
      stop_if:
        - "Need files outside allowed_files."
        - "Need upstream GoalBuddy refactor instead of local update-friendly customization."
        - "Cannot express the behavior with deterministic tests."
        - "The change would force TDD or shipping onto audit_read_only or verification goals."
        - "Verification fails twice."
      impact_assessment_ref: T001
      deferred_or_blocked_tasks:
        - "Installed-template compatibility can run after local implementation tests pass."
        - "GitHub shipping is expected to block if this workspace remains outside a git repository."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement the first safe video-derived workflow upgrade package selected by Judge."
