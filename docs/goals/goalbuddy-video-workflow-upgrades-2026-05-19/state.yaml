        ubiquitous_language: "The scripts now use explicit board terms: workflow_safeguards, design_concept, ubiquitous_language, feedback_policy, test_strategy, module_map, interface_contract, architecture_review, and design_delta."
        feedback_policy: "Active implementation Workers must expose feedback_policy/test_strategy/interface_contract, and final evidence must prove feedback was used."
        test_strategy: "Checker and repair behavior is covered through deterministic Node tests with red/green evidence."
        module_map: "Existing deep boundary preserved: checker validates, repair normalizes, personalization installs, README documents."
        interface_contract: "state.yaml is the contract surface; repair creates fields, checker validates receipts, installer patches GoalBuddy prompts/templates."
        architecture_review: "No upstream refactor or new subsystem; changes remain inside the local update-friendly customization layer."
      impact_assessment_ref: T001
      design_delta:
        changed:
          - "Added workflow_safeguards policy flags and final evidence checks."
          - "Board repair now inserts safeguard flags and Scout/Judge/Worker/final-audit expectations."
          - "Personalization patches GoalBuddy prompts/templates with video-derived workflow discipline."
          - "README documents the new model."
        stable:
          - "Existing goal_policy modes remain intact."
          - "audit_read_only and verification remain lightweight and do not require fake TDD/shipping/design ceremony."
          - "No product code, DB, env, auth, external service, deployment, or upstream GoalBuddy source changed."
        deferred:
          - "Installed GoalBuddy files are applied in T005."

  - id: T004
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: medium
    objective: "Add representative board examples and regression tests proving the new safeguards stay proportionate across implementation, verification, audit, research/docs, and architecture-sensitive goals."
    inputs:
