          status: passed
        - command: "node --check scripts/goalbuddy-board-repair.mjs"
          status: passed
        - command: "node --check scripts/personalize-goalbuddy.mjs"
          status: passed
        - command: "node --test scripts/goalbuddy-quality-check.test.mjs scripts/goalbuddy-board-repair.test.mjs"
          status: passed
        - command: "node scripts/personalize-goalbuddy.mjs --dry-run"
          status: passed
          summary: "Dry-run would patch 12 installed GoalBuddy files and copy 4 scripts."
        - command: "node scripts/goalbuddy-quality-check.mjs docs/goals/goalbuddy-video-workflow-upgrades-2026-05-19/state.yaml"
          status: passed
      workflow_safeguards:
