      test_strategy: "Add or preserve smoke coverage for package-installed binaries; verify with npm test and a local npm pack consumer smoke. No browser checks needed."
      feedback_policy: "Run targeted docs/test inspection first, then npm test, npm pack smoke, and quality check before shipping."
