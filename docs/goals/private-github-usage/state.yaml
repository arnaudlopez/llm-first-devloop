version: 2
goal:
  slug: "private-github-usage-notes"
  title: "Private GitHub Usage Notes"
  status: complete
  created_at: "2026-05-23"
  updated_at: "2026-05-23"
  kind: specific
  original_request: "# Private GitHub Usage Notes\n\n## Intent\n\nWe decided not to publish `llm-first-devloop` to npm yet. Users still need a clean private/pre-public workflow that works from the GitHub repository or a local clone.\n\nA developer can understand and verify how to use LLM First DevLoop before npm publication, without guessing which command path is supported.\n\n- Do not publish to npm.\n- Do not add hosted services.\n- Do not change the GoalBuddy model.\n- Do not require a global install.\n\n## Non-Goals\n\n- TODO: Name what this goal must not change.\n\n## Proposed Oracle\n\nA fresh reader can follow the README to use LLM First DevLoop without npm publication, and the package smoke tests prove the documented CLI binaries still execute.\n\n## Suggested Mode\n\nimplementation\n\n## Acceptance Hints\n\n- The README has a clear \"Before npm publication\" path.\n- The documented private/local commands match the current CLI.\n- Tests or smoke checks prove the package binary entrypoints still work from a packaged install.\n- The final evidence distinguishes GitHub/local usage from future npm usage.\n\n## Risks And Open Questions\n\n- TODO: List ambiguity, missing credentials, operational risks, or decisions needed before implementation.\n\n## Constraints\n\n- TODO: Capture constraints, must-preserve behavior, boundaries, or forbidden changes.\n\n## Ready Mode Command\n\n```bash\nnpm run ready -- --from ./docs/goals/private-github-usage/brief.md --mode implementation --oracle \"A fresh reader can follow the README to use LLM First DevLoop without npm publication, and the package smoke tests prove the documented CLI binaries still execute.\" --out docs/goals/private-github-usage-notes\n```\n\n## Source Notes\n\nCompiled from: /Users/arnaud/Documents/llm-first-devloop/examples/private-github-usage-notes.md\n\n> # Private GitHub Usage Notes\n> \n> ## Intent\n> \n> We decided not to publish `llm-first-devloop` to npm yet. Users still need a clean private/pre-public workflow that works from the GitHub repository or a local clone.\n> \n> ## User Outcome\n> \n> A developer can understand and verify how to use LLM First DevLoop before npm publication, without guessing which command path is supported.\n> \n> ## Non-Goals\n> \n> - Do not publish to npm.\n> - Do not add hosted services.\n> - Do not change the GoalBuddy model.\n> - Do not require a global install.\n> \n> ## Acceptance\n> \n> - The README has a clear \"Before npm publication\" path.\n> - The documented private/local commands match the current CLI.\n> - Tests or smoke checks prove the package binary entrypoints still work from a packaged install.\n> - The final evidence distinguishes GitHub/local usage from future npm usage.\n> \n> ## Oracle\n> \n> A fresh reader can follow the README to use LLM First DevLoop without npm publication, and the package smoke tests prove the documented CLI binaries still execute."
  interpreted_outcome: "Run the prepared LLM-first workflow for Private GitHub Usage Notes."
  input_shape: specific
  audience: "Product owner and target users"
  authority: requested
  proof_type:
    - test
    - artifact
    - review
  completion_proof: "Final audit maps red tests, green verification, implementation receipts, and shipping proof back to the oracle."
  goal_oracle: "A fresh reader can follow the README to use LLM First DevLoop without npm publication, and the package smoke tests prove the documented CLI binaries still execute."
  oracle:
    signal: "A fresh reader can follow the README to use LLM First DevLoop without npm publication, and the package smoke tests prove the documented CLI binaries still execute."
    final_proof: "T999 states full_outcome_complete: true and cites passing acceptance evidence, verification commands, design review, and T998 shipping evidence."
  likely_misfire: "Starting implementation from a plausible plan before converting the owner outcome into acceptance tests and observable proof."
  constraints:
    - "Acceptance tests or equivalent observable proof must be written before production implementation."
    - "Implementation must stay inside Judge-approved allowed_files."
    - "Unrelated dirty worktree changes must remain untouched."

